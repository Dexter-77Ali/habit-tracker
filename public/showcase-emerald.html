<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emerald &amp; Onyx — web + mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#050B07;color:#EEE8D7;font-family:'Space Grotesk',system-ui,sans-serif;
  padding:40px clamp(16px,4vw,56px) 80px;-webkit-font-smoothing:antialiased}
.head{max-width:1180px;margin:0 auto 36px}
.eyebrow{font-size:.68rem;letter-spacing:.26em;text-transform:uppercase;color:#8F701F;font-weight:600;margin-bottom:10px}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(1.8rem,4vw,2.8rem);letter-spacing:-.02em;margin-bottom:8px}
h1 i{font-style:italic;color:#CBA53E}
.sub{color:#9FB3A0;font-size:.95rem;max-width:60ch}
.swatches{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.sw{display:flex;align-items:center;gap:8px;font-size:.72rem;color:#9FB3A0;border:1px solid #1E3324;border-radius:999px;padding:5px 11px 5px 6px}
.sw i{width:14px;height:14px;border-radius:4px;display:inline-block}
.wrap{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:44px}
.panel .cap{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:#5F7A63;margin-bottom:14px;font-weight:600}
.browser{border:1px solid #1E3324;border-radius:16px;overflow:hidden;box-shadow:0 40px 80px -30px rgba(0,0,0,.8);background:#0E1A12}
.browser .bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #1E3324;background:#0A130C}
.browser .bar i{width:11px;height:11px;border-radius:50%;background:#2B4632;display:inline-block}
.browser .bar span{margin-left:14px;font-size:.72rem;color:#5F7A63}
.browser iframe{width:100%;height:880px;border:0;display:block;background:#08110C}
.phones{display:flex;justify-content:center}
.phone{width:390px;max-width:100%;height:790px;border-radius:46px;border:11px solid #10160f;background:#000;
  position:relative;overflow:hidden;box-shadow:0 50px 90px -30px rgba(0,0,0,.85),0 0 0 1px #223a26}
.phone .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#10160f;border-radius:0 0 18px 18px;z-index:2}
.phone iframe{width:100%;height:100%;border:0;display:block}
</style>
</head>
<body>
  <div class="head">
    <div class="eyebrow">Ritual collection · design 04</div>
    <h1>Emerald <i>&amp; Onyx</i></h1>
    <p class="sub">Jewel-tone old-money. Green-leather surfaces and warm gold, ivory serif numerals — the private-library, Rolex-green register of quiet wealth.</p>
    <div class="swatches">
      <span class="sw"><i style="background:#08110C"></i>#08110C onyx</span>
      <span class="sw"><i style="background:#0E1A12"></i>#0E1A12 surface</span>
      <span class="sw"><i style="background:#CBA53E"></i>#CBA53E gold</span>
      <span class="sw"><i style="background:#EEE8D7"></i>#EEE8D7 ivory</span>
    </div>
  </div>
  <div class="wrap">
    <div class="panel">
      <div class="cap">Web · desktop</div>
      <div class="browser">
        <div class="bar"><i></i><i></i><i></i><span>ritual.app / today</span></div>
        <iframe src="showcase-app.html?theme=emerald" title="Emerald web view" loading="lazy"></iframe>
      </div>
    </div>
    <div class="panel">
      <div class="cap">Mobile · app</div>
      <div class="phones">
        <div class="phone"><div class="notch"></div>
          <iframe src="showcase-app.html?theme=emerald" title="Emerald mobile view" loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
